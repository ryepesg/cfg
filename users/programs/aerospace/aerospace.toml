# Live AeroSpace config, shared across machines via this `cfg` repo.
# Edit freely, then run:  aerospace reload-config

# AeroSpace is now installed as a Homebrew cask (not the nix-darwin launchd
# agent), so launch-at-login is owned here rather than by Nix.
start-at-login = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
# Move the pointer to the center of the focused window on every focus change.
# 'lazy' = only move if the pointer isn't already inside that window.
on-focus-changed = ['move-mouse window-lazy-center']
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.top = 8
outer.right = 8

# Workspace -> monitor pinning. The scheme: NUMBERS live on the laptop (front,
# where the work happens); LETTERS live on the external (left, the things you
# look AT — comms / notes / agenda / preview / browser). The TYPE of key you
# press tells you which screen before you even think about it.
# ROLE keywords, not literal display names, so the SAME file works on the
# different machines (their screen names differ).
# Assumes the laptop is the primary display (menu bar on built-in) so
# 'secondary' = the external. Array = ordered fallback: external when docked,
# else 'main' (the built-in) when undocked, so nothing is orphaned.
#   Laptop  (numbers): 1 Primary work  2 Project/2nd context  3 Scratch  (4-5 spare)
#   External (letters): C Comms  N Notes  A Agenda  I Intelligence  M Media  P Preview  B Browser/research  W Work browser
[workspace-to-monitor-force-assignment]
1 = 'built-in'
2 = 'built-in'
3 = 'built-in'
4 = 'built-in'
5 = 'built-in'
A = ['secondary', 'main']
B = ['secondary', 'main']
C = ['secondary', 'main']
I = ['secondary', 'main']
M = ['secondary', 'main']
N = ['secondary', 'main']
P = ['secondary', 'main']
W = ['secondary', 'main']

# alt = the Option (⌥) key
[mode.main.binding]
# Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move window
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-shift-f = 'fullscreen'

# Non conflicting old habits
alt-f4 = 'close'

# Resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Switch to workspace — numbers = laptop (front), letters = external (left)
alt-1 = 'workspace 1'   # primary work: terminal + editor
alt-2 = 'workspace 2'   # project / 2nd context
alt-3 = 'workspace 3'   # scratch / experiments
alt-4 = 'workspace 4'   # spare (laptop)
alt-5 = 'workspace 5'   # spare (laptop)
alt-c = 'workspace C'   # comms: Slack + email
alt-n = 'workspace N'   # notes: Logseq
alt-a = 'workspace A'   # agenda: calendar
alt-i = 'workspace I'   # intelligence
alt-m = 'workspace M'   # media
alt-p = 'workspace P'   # preview
alt-b = 'workspace B'   # browser / research: Brave
alt-w = 'workspace W'   # work browser: Chrome

# Move focused window to workspace (same number/letter mnemonic)
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-c = 'move-node-to-workspace C'
alt-shift-n = 'move-node-to-workspace N'
alt-shift-a = 'move-node-to-workspace A'
alt-shift-i = 'move-node-to-workspace I'
alt-shift-m = 'move-node-to-workspace M'
alt-shift-p = 'move-node-to-workspace P'
alt-shift-b = 'move-node-to-workspace B'
alt-shift-w = 'move-node-to-workspace W'

alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# App launching (skhd-style: exec-and-forget shells out, detached).
# Only a SPAWN action remains. Switching to an app is done by going to its home
# workspace (the letters above), not by raising the app — so the old
# alt-b (Brave) / alt-g (Logseq) launchers are gone; alt-b is now the browser
# WORKSPACE switch, and Logseq is reached via alt-n.
alt-enter = 'exec-and-forget open -na Ghostty'   # new terminal (-> WS1)

# Enter service mode
alt-shift-semicolon = 'mode service'

# Service mode: each action runs then returns to main mode.
# Enter with alt-shift-; , then press one of these.
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# Auto-routing: when a matching window opens, send it to its home workspace.
# [[ ]] = a TOML array entry, so you can stack as many rules as you want.
# NOTE: these fire only when a window is FIRST detected (newly opened, or on
# AeroSpace restart when all windows are re-detected). They do NOT re-sort
# windows you manually move during a session — temporary moves stay put until
# you close the window or restart AeroSpace.

# --- Laptop (numbers) ---
# WS1 Primary work: terminal (and editor — add a rule once an editor is settled).
[[on-window-detected]]
if.app-name-regex-substring = 'ghostty'
run = 'move-node-to-workspace 1'
# [[on-window-detected]]
# if.app-name-regex-substring = 'cursor|visual studio code'
# run = 'move-node-to-workspace 1'

# --- External (letters) ---

# C Comms: Slack + the Gmail PWA (installed standalone, so it reports the
# app-name 'Gmail', not the browser).
[[on-window-detected]]
if.app-name-regex-substring = 'slack'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-name-regex-substring = 'gmail'
run = 'move-node-to-workspace C'

# A Agenda: the Google Calendar PWA.
[[on-window-detected]]
if.app-name-regex-substring = 'calendar'
run = 'move-node-to-workspace A'

# N Notes: Logseq.
[[on-window-detected]]
if.app-name-regex-substring = 'logseq'
run = 'move-node-to-workspace N'

# P Preview / PDF: Preview.
[[on-window-detected]]
if.app-name-regex-substring = 'preview'
run = 'move-node-to-workspace P'

# I Intelligence: the Claude PWA. Install it standalone (Edge/Brave -> Apps ->
# "Install this site as an app") so it reports the app-name 'Claude' rather than
# the browser — same standalone-PWA trick as Gmail/Calendar above. Until then this
# is a harmless no-op (a rule whose app isn't installed simply never fires); Claude
# opened as a plain browser tab stays with the browser on B.
[[on-window-detected]]
if.app-name-regex-substring = 'claude'
run = 'move-node-to-workspace I'

# M Media: the YouTube PWA (install standalone so it reports the app-name
# 'YouTube', same trick as the other PWAs above). 
[[on-window-detected]]
if.app-name-regex-substring = 'youtube'
run = 'move-node-to-workspace M'

# B Browser / research: Brave. 'chrome' kept as a harmless no-op for cross-machine
# parity (a rule whose app isn't installed simply never fires).
# Browser windows stack as an accordion on B (one expanded, the rest as titled
# slivers) — better for many tabs/windows than tiling them small. The array runs
# the move first, then sets B's layout, as each browser window is detected.
[[on-window-detected]]
if.app-name-regex-substring = 'brave'
run = ['move-node-to-workspace B', 'layout accordion']

[[on-window-detected]]
if.app-name-regex-substring = 'edge'
run = ['move-node-to-workspace B', 'layout accordion']

# W for Work related browser
[[on-window-detected]]
if.app-name-regex-substring = 'chrome'
run = ['move-node-to-workspace W', 'layout accordion']

# Infra (local VM / remote-box GUIs) has no dedicated workspace in this scheme —
# drive remote boxes via SSH in the terminal (WS1) or send the GUI somewhere by
# hand with alt-shift-<n>. Uncomment + pick a home if it earns its own slot.
# [[on-window-detected]]
# if.app-name-regex-substring = 'vmware|fusion|utm'
# run = 'move-node-to-workspace 2'

# Float the superwhisper widget so it isn't tiled (it otherwise collides with
# the terminal, which is annoying). Match by app-id to be precise.
[[on-window-detected]]
if.app-id = 'com.superduper.superwhisper'
run = 'layout floating'
